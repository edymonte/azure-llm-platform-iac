name: Terraform CI (Self-Hosted)

# ─────────────────────────────────────────────────────────────────────────────
# Runner: self-hosted Azure VM (Linux/x64) with System Assigned Managed Identity
# Auth  : az login --identity  (no Service Principal or secrets required)
# ─────────────────────────────────────────────────────────────────────────────

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      run_apply:
        description: "Run terraform apply (requires protected environment approval)"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  validate_and_plan_pr:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: [self-hosted, linux, x64]
    env:
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Runner preflight (required tools)
        shell: bash
        run: |
          set -e
          missing=()
          for tool in unzip curl jq az git bash; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              missing+=("$tool")
            fi
          done
          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing required tools on self-hosted runner: ${missing[*]}"
            echo "Install on Debian/Ubuntu: sudo apt-get update && sudo apt-get install -y ${missing[*]}"
            exit 1
          fi
          echo "All required tools present."

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Azure Login via Managed Identity
        shell: bash
        run: |
          az login --identity
          if [[ -n "${AZURE_SUBSCRIPTION_ID:-}" ]]; then
            az account set --subscription "$AZURE_SUBSCRIPTION_ID"
          fi
          az account show --output table

      - name: Terraform Fmt Check
        shell: bash
        run: |
          terraform fmt -check -recursive

      - name: Validate Backend Stack
        shell: bash
        working-directory: dev/backend-storage
        run: |
          terraform init -input=false
          terraform validate

      - name: Validate Main Stack
        shell: bash
        working-directory: dev/terraform
        run: |
          terraform init -input=false -backend=false
          terraform validate

      - name: Optional Plan (when dev.tfvars is available)
        if: ${{ hashFiles('dev/terraform/dev.tfvars') != '' }}
        shell: bash
        working-directory: dev/terraform
        run: |
          terraform plan -input=false -var-file=dev.tfvars -lock=false

  apply_manual:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_apply == true }}
    runs-on: [self-hosted, linux, x64]
    environment: production
    env:
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Runner preflight (required tools)
        shell: bash
        run: |
          set -e
          missing=()
          for tool in unzip curl jq az git bash; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              missing+=("$tool")
            fi
          done
          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing required tools on self-hosted runner: ${missing[*]}"
            echo "Install on Debian/Ubuntu: sudo apt-get update && sudo apt-get install -y ${missing[*]}"
            exit 1
          fi
          echo "All required tools present."

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Azure Login via Managed Identity
        shell: bash
        run: |
          az login --identity
          if [[ -n "${AZURE_SUBSCRIPTION_ID:-}" ]]; then
            az account set --subscription "$AZURE_SUBSCRIPTION_ID"
          fi
          az account show --output table

      - name: Materialize tfvars from secrets
        shell: bash
        working-directory: dev/terraform
        env:
          BACKEND_TFVARS: ${{ secrets.BACKEND_TFVARS }}
          DEV_TFVARS: ${{ secrets.DEV_TFVARS }}
        run: |
          set -e
          if [[ -z "${BACKEND_TFVARS:-}" || -z "${DEV_TFVARS:-}" ]]; then
            echo "::error::Missing repository secrets BACKEND_TFVARS and/or DEV_TFVARS"
            exit 1
          fi
          printf '%s\n' "$BACKEND_TFVARS" > backend.tfvars
          printf '%s\n' "$DEV_TFVARS"     > dev.tfvars
          chmod 600 backend.tfvars dev.tfvars
          echo "Materialized backend.tfvars ($(wc -l < backend.tfvars) lines) and dev.tfvars ($(wc -l < dev.tfvars) lines)"

      - name: Ensure required tfvars exist
        shell: bash
        run: |
          test -f dev/terraform/backend.tfvars || { echo "Missing dev/terraform/backend.tfvars"; exit 1; }
          test -f dev/terraform/dev.tfvars || { echo "Missing dev/terraform/dev.tfvars"; exit 1; }

      - name: Terraform Init/Validate/Plan/Apply
        shell: bash
        working-directory: dev/terraform
        run: |
          terraform init -input=false -reconfigure -backend-config=backend.tfvars
          terraform validate
          terraform plan -input=false -var-file=dev.tfvars -out=plan.tfplan
          terraform apply -input=false -auto-approve plan.tfplan
